runbook:
  id: runbook.redis_enterprise.vm.single_node
  name: "Redis Enterprise on VM - Single Node"
  description: "Deploy a single-node Redis Enterprise Software 8.0.x instance on a Linux VM for development or testing. Note: Single-node deployments do not support high availability or replication."
  version: "2.0.0"
  redis_version: "8.0.x"
  validated: true
  validation_date: "2026-03-05"

  prerequisites:
    - check: ssh_access
      command: "ssh -o ConnectTimeout=5 -o BatchMode=yes $TARGET_HOST exit"
      error_message: "Cannot SSH to target host. Set TARGET_HOST environment variable and configure SSH keys."

    - check: os_supported
      command: "ssh $TARGET_HOST 'cat /etc/os-release | grep -E \"(Ubuntu|CentOS|RHEL)\"'"
      error_message: "Target OS must be Ubuntu, CentOS, or RHEL. See supported platforms documentation."

    - check: root_or_sudo
      command: "ssh $TARGET_HOST 'sudo -n true 2>/dev/null && echo ok || echo fail'"
      error_message: "Must have sudo access on target host. Installation requires root privileges."

    - check: installation_package_available
      command: "test -f $REDIS_ENTERPRISE_PACKAGE"
      error_message: "Redis Enterprise installation package not found. Download from https://cloud.redis.io/#/rlec-downloads and set REDIS_ENTERPRISE_PACKAGE environment variable."

  steps:
    - id: step_1
      name: "Copy installation package to target host"
      description: "Transfer the Redis Enterprise installation package to the target VM"
      doc_refs:
        - path: "operate/rs/installing-upgrading/install/prepare-install/download-install-package.md"
          section: "Download installation package"
      rag_assist:
        query: "How do I download Redis Enterprise installation package?"
        filters:
          category: operate
          product_area: redis_software
        max_results: 3
      tool: scp
      command: "scp $REDIS_ENTERPRISE_PACKAGE $TARGET_HOST:~/"
      validation:
        command: "ssh $TARGET_HOST 'ls -l ~/$(basename $REDIS_ENTERPRISE_PACKAGE)'"
        expect: "$(basename $REDIS_ENTERPRISE_PACKAGE)"

    - id: step_2
      name: "Extract installation files"
      description: "Extract the Redis Enterprise installation package on the target host"
      doc_refs:
        - path: "operate/rs/installing-upgrading/install/install-on-linux.md"
          section: "Extract the installation files"
      tool: ssh
      command: "ssh $TARGET_HOST 'tar vxf $(basename $REDIS_ENTERPRISE_PACKAGE)'"
      validation:
        command: "ssh $TARGET_HOST 'test -f install.sh && echo ok'"
        expect: "ok"

    - id: step_3
      name: "Run installation script"
      description: "Execute the Redis Enterprise installation script with silent mode (-y flag skips interactive questions)"
      doc_refs:
        - path: "operate/rs/installing-upgrading/install/install-on-linux.md"
          section: "Run the installation script"
        - path: "operate/rs/installing-upgrading/install/install-script.md"
          section: "Installation script options"
      rag_assist:
        query: "How do I run the Redis Enterprise installation script?"
        filters:
          category: operate
          product_area: redis_software
        max_results: 5
      tool: ssh
      command: "ssh $TARGET_HOST 'sudo ./install.sh -y'"
      validation:
        command: "ssh $TARGET_HOST 'curl -k -s -o /dev/null -w \"%{http_code}\" https://localhost:8443'"
        expect: "200"
        retry: 5
        retry_delay: 10

    - id: step_4
      name: "Access Cluster Manager UI"
      description: "Navigate to the Cluster Manager UI at https://<IP>:8443 to complete cluster setup. Select 'Create new cluster' and follow the web-based setup wizard."
      doc_refs:
        - path: "operate/rs/clusters/new-cluster-setup.md"
          section: "Create a new cluster"
      rag_assist:
        query: "How do I create a new Redis Enterprise cluster using the web UI?"
        filters:
          category: operate
          product_area: redis_software
        max_results: 5
      tool: manual
      command: "echo 'Manual step: Navigate to https://$TARGET_HOST:8443 and complete cluster setup wizard'"
      validation:
        command: "curl -k -s -o /dev/null -w '%{http_code}' https://$TARGET_HOST:8443"
        expect: "200"

  post_validations:
    - check: web_ui_accessible
      command: "curl -k -s -o /dev/null -w '%{http_code}' https://$TARGET_HOST:8443"
      expect: "200"

    - check: installation_complete
      command: "ssh $TARGET_HOST 'test -d /opt/redislabs && echo ok'"
      expect: "ok"

  rollback:
    - command: "ssh $TARGET_HOST 'sudo /opt/redislabs/bin/rlcheck --uninstall || true'"
    - command: "ssh $TARGET_HOST 'sudo rm -rf /opt/redislabs'"

  notes:
    - "Single-node deployments are suitable for development and testing only"
    - "Production deployments should use a minimum of 3 nodes for high availability"
    - "Cluster setup is completed via web UI at https://<IP>:8443"
    - "Default installation creates 'redislabs' user and group"
    - "Installation uses self-signed TLS certificate by default"

