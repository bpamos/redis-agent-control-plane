runbook:
  id: runbook.redis_enterprise.database.vm_crdb
  name: "Redis Enterprise Database on VM - Active-Active (CRDB)"
  description: "Create an Active-Active CRDB (Conflict-free Replicated Database) across two Redis Enterprise VM clusters. Requires clusters to be prepared for Active-Active."
  version: "2.0.0"
  redis_version: "8.0.x"
  validated: true
  validation_date: "2026-03-05"

  prerequisites:
    - check: cluster1_deployed
      command: "ssh $CLUSTER1_NODE1_HOST 'sudo /opt/redislabs/bin/rladmin status' | grep -q 'cluster ok'"
      error_message: "Cluster 1 is not deployed or not healthy"

    - check: cluster2_deployed
      command: "ssh $CLUSTER2_NODE1_HOST 'sudo /opt/redislabs/bin/rladmin status' | grep -q 'cluster ok'"
      error_message: "Cluster 2 is not deployed or not healthy"

    - check: clusters_linked
      command: "ssh $CLUSTER1_NODE1_HOST 'sudo /opt/redislabs/bin/rladmin cluster peer list' | grep -q '$CLUSTER2_FQDN'"
      error_message: "Clusters are not linked. Run active_active_prepare.yaml first to link clusters"

    - check: service_account_exists
      command: "curl -k -s -u '$SERVICE_ACCOUNT_USERNAME:$SERVICE_ACCOUNT_PASSWORD' https://$CLUSTER1_NODE1_HOST:9443/v1/users | grep -q '$SERVICE_ACCOUNT_USERNAME'"
      error_message: "Service account does not exist. Create a service account with Admin role on both clusters"

  steps:
    - id: step_1
      name: "Create CRDB on cluster 1"
      description: "Create the Active-Active database on the first participating cluster"
      doc_refs:
        - path: "operate/rs/databases/active-active/create.md"
          section: "Create an Active-Active database"
      rag_assist:
        query: "How do I create an Active-Active CRDB database on Redis Enterprise?"
        filters:
          category: operate
          product_area: redis_software
        max_results: 5
      tool: curl
      command: |
        curl -k -u "$ADMIN_USERNAME:$ADMIN_PASSWORD" \
          -H "Content-Type: application/json" \
          -X POST https://$CLUSTER1_NODE1_HOST:9443/v1/crdbs \
          -d '{
            "name": "'$DB_NAME'",
            "memory_size": 1073741824,
            "port": '$DB_PORT',
            "replication": true,
            "sharding": false,
            "shards_count": 1,
            "proxy_policy": "all-master-shards",
            "oss_cluster": false,
            "instances": [
              {
                "cluster": {
                  "url": "https://'$CLUSTER1_FQDN':9443",
                  "credentials": {
                    "username": "'$SERVICE_ACCOUNT_USERNAME'",
                    "password": "'$SERVICE_ACCOUNT_PASSWORD'"
                  }
                }
              },
              {
                "cluster": {
                  "url": "https://'$CLUSTER2_FQDN':9443",
                  "credentials": {
                    "username": "'$SERVICE_ACCOUNT_USERNAME'",
                    "password": "'$SERVICE_ACCOUNT_PASSWORD'"
                  }
                }
              }
            ]
          }'
      validation:
        command: "curl -k -s -u '$ADMIN_USERNAME:$ADMIN_PASSWORD' https://$CLUSTER1_NODE1_HOST:9443/v1/crdbs | grep -q '$DB_NAME'"
        expect: "$DB_NAME"
        retry: 10
        retry_delay: 5

    - id: step_2
      name: "Wait for CRDB to become active on cluster 1"
      description: "Wait for the CRDB to be fully provisioned on cluster 1"
      doc_refs:
        - path: "operate/rs/databases/active-active/create.md"
          section: "Verify creation"
      rag_assist:
        query: "How do I verify an Active-Active CRDB is active?"
        filters:
          category: operate
          product_area: redis_software
        max_results: 3
      tool: curl
      command: |
        for i in {1..60}; do
          STATUS=$(curl -k -s -u "$ADMIN_USERNAME:$ADMIN_PASSWORD" \
            https://$CLUSTER1_NODE1_HOST:9443/v1/crdbs | \
            jq -r '.[] | select(.name=="'$DB_NAME'") | .status')
          if [ "$STATUS" = "active" ]; then
            echo "CRDB is active on cluster 1"
            exit 0
          fi
          echo "Waiting for CRDB to become active on cluster 1... (attempt $i/60)"
          sleep 5
        done
        exit 1
      validation:
        command: "curl -k -s -u '$ADMIN_USERNAME:$ADMIN_PASSWORD' https://$CLUSTER1_NODE1_HOST:9443/v1/crdbs | jq -r '.[] | select(.name==\"$DB_NAME\") | .status' | grep -q 'active'"
        expect: "active"
        retry: 60
        retry_delay: 5

    - id: step_3
      name: "Verify CRDB exists on cluster 2"
      description: "Verify that the CRDB instance was automatically created on cluster 2"
      doc_refs:
        - path: "operate/rs/databases/active-active/create.md"
          section: "Verify creation"
      rag_assist:
        query: "How do I verify Active-Active database instances across clusters?"
        filters:
          category: operate
          product_area: redis_software
        max_results: 3
      tool: curl
      command: "curl -k -s -u '$ADMIN_USERNAME:$ADMIN_PASSWORD' https://$CLUSTER2_NODE1_HOST:9443/v1/crdbs | jq -r '.[] | select(.name==\"$DB_NAME\")'"
      validation:
        command: "curl -k -s -u '$ADMIN_USERNAME:$ADMIN_PASSWORD' https://$CLUSTER2_NODE1_HOST:9443/v1/crdbs | grep -q '$DB_NAME'"
        expect: "$DB_NAME"
        retry: 30
        retry_delay: 5

    - id: step_4
      name: "Wait for CRDB to become active on cluster 2"
      description: "Wait for the CRDB instance to be fully active on cluster 2"
      doc_refs:
        - path: "operate/rs/databases/active-active/create.md"
          section: "Verify creation"
      rag_assist:
        query: "How do I verify Active-Active CRDB synchronization?"
        filters:
          category: operate
          product_area: redis_software
        max_results: 3
      tool: curl
      command: |
        for i in {1..60}; do
          STATUS=$(curl -k -s -u "$ADMIN_USERNAME:$ADMIN_PASSWORD" \
            https://$CLUSTER2_NODE1_HOST:9443/v1/crdbs | \
            jq -r '.[] | select(.name=="'$DB_NAME'") | .status')
          if [ "$STATUS" = "active" ]; then
            echo "CRDB is active on cluster 2"
            exit 0
          fi
          echo "Waiting for CRDB to become active on cluster 2... (attempt $i/60)"
          sleep 5
        done
        exit 1
      validation:
        command: "curl -k -s -u '$ADMIN_USERNAME:$ADMIN_PASSWORD' https://$CLUSTER2_NODE1_HOST:9443/v1/crdbs | jq -r '.[] | select(.name==\"$DB_NAME\") | .status' | grep -q 'active'"
        expect: "active"
        retry: 60
        retry_delay: 5

    - id: step_5
      name: "Test cross-region replication"
      description: "Verify Active-Active replication by writing to cluster 1 and reading from cluster 2"
      doc_refs:
        - path: "operate/rs/databases/active-active/create.md"
          section: "Confirm Active-Active database synchronization"
      rag_assist:
        query: "How do I test Active-Active database synchronization?"
        filters:
          category: operate
          product_area: redis_software
        max_results: 3
      tool: redis-cli
      command: |
        # Write to cluster 1
        redis-cli -h $CLUSTER1_NODE1_HOST -p $DB_PORT SET test_key "active-active-test-$(date +%s)"
        sleep 2
        # Read from cluster 2
        redis-cli -h $CLUSTER2_NODE1_HOST -p $DB_PORT GET test_key
      validation:
        command: "redis-cli -h $CLUSTER1_NODE1_HOST -p $DB_PORT SET aa_test 'sync_test' && sleep 3 && redis-cli -h $CLUSTER2_NODE1_HOST -p $DB_PORT GET aa_test | grep -q 'sync_test'"
        expect: "sync_test"
        retry: 10
        retry_delay: 3

  post_validations:
    - check: crdb_exists_cluster1
      command: "curl -k -s -u '$ADMIN_USERNAME:$ADMIN_PASSWORD' https://$CLUSTER1_NODE1_HOST:9443/v1/crdbs | grep -q '$DB_NAME'"
      expect: "$DB_NAME"

    - check: crdb_exists_cluster2
      command: "curl -k -s -u '$ADMIN_USERNAME:$ADMIN_PASSWORD' https://$CLUSTER2_NODE1_HOST:9443/v1/crdbs | grep -q '$DB_NAME'"
      expect: "$DB_NAME"

    - check: crdb_active_cluster1
      command: "curl -k -s -u '$ADMIN_USERNAME:$ADMIN_PASSWORD' https://$CLUSTER1_NODE1_HOST:9443/v1/crdbs | jq -r '.[] | select(.name==\"$DB_NAME\") | .status' | grep -q 'active'"
      expect: "active"

    - check: crdb_active_cluster2
      command: "curl -k -s -u '$ADMIN_USERNAME:$ADMIN_PASSWORD' https://$CLUSTER2_NODE1_HOST:9443/v1/crdbs | jq -r '.[] | select(.name==\"$DB_NAME\") | .status' | grep -q 'active'"
      expect: "active"

    - check: replication_working
      command: "redis-cli -h $CLUSTER1_NODE1_HOST -p $DB_PORT SET validation_key 'test' && sleep 3 && redis-cli -h $CLUSTER2_NODE1_HOST -p $DB_PORT GET validation_key | grep -q 'test'"
      expect: "test"

  rollback:
    - command: "curl -k -u '$ADMIN_USERNAME:$ADMIN_PASSWORD' -X DELETE https://$CLUSTER1_NODE1_HOST:9443/v1/crdbs/$(curl -k -s -u '$ADMIN_USERNAME:$ADMIN_PASSWORD' https://$CLUSTER1_NODE1_HOST:9443/v1/crdbs | jq -r '.[] | select(.name==\"$DB_NAME\") | .guid')"

  notes:
    - "This runbook creates an Active-Active CRDB across two Redis Enterprise VM clusters"
    - "Prerequisites: Both clusters must be prepared using active_active_prepare.yaml"
    - "Database specifications: 1GB memory per instance, 1 master shard, replication enabled"
    - "Service account: Create a user with Admin role on both clusters before running this runbook"
    - "The CRDB is created on cluster 1 and automatically propagated to cluster 2"
    - "All write operations are synchronized across both instances without conflict"
    - "Environment variables required: CLUSTER1_NODE1_HOST, CLUSTER2_NODE1_HOST, CLUSTER1_FQDN, CLUSTER2_FQDN, ADMIN_USERNAME, ADMIN_PASSWORD, SERVICE_ACCOUNT_USERNAME, SERVICE_ACCOUNT_PASSWORD, DB_NAME, DB_PORT"
    - "After creation, applications can write to either cluster and reads will be consistent across both"
    - "For production use, configure proper conflict resolution policies based on your use case"

