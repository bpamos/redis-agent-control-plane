runbook:
  id: runbook.redis_enterprise.kubernetes.clustered
  name: "Redis Enterprise on Kubernetes - 3-Node Cluster"
  description: "Deploy a 3-node Redis Enterprise Cluster (REC) on Kubernetes using the Redis Enterprise Operator. Includes operator installation and cluster deployment."
  version: "2.0.0"
  redis_version: "8.0.x"
  validated: true
  validation_date: "2026-03-05"

  prerequisites:
    - check: kubectl_installed
      command: "kubectl version --client"
      error_message: "kubectl is not installed. Install kubectl to manage Kubernetes clusters."

    - check: kubernetes_cluster_accessible
      command: "kubectl cluster-info"
      error_message: "Cannot access Kubernetes cluster. Ensure kubeconfig is configured and cluster is running."

    - check: kubernetes_version
      command: "kubectl version --short | grep 'Server Version' | grep -E 'v1\\.(2[4-9]|[3-9][0-9])'"
      error_message: "Kubernetes version must be 1.24 or higher for Redis Enterprise Operator."

    - check: namespace_exists
      command: "kubectl get namespace $NAMESPACE"
      error_message: "Namespace $NAMESPACE does not exist. Create it with: kubectl create namespace $NAMESPACE"

  steps:
    - step_ref: redis_enterprise/kubernetes/install_operator
      parameters:
        namespace: $NAMESPACE

    - step_ref: redis_enterprise/kubernetes/wait_operator_ready
      parameters:
        namespace: $NAMESPACE

    - step_ref: redis_enterprise/kubernetes/create_rec
      parameters:
        cluster_name: $CLUSTER_NAME
        namespace: $NAMESPACE
        nodes: 3
        storage_class: $STORAGE_CLASS
        volume_size: "50Gi"
        cpu_limit: "4"
        memory_limit: "16Gi"
        cpu_request: "2"
        memory_request: "8Gi"
        admin_username: $ADMIN_USERNAME

    - step_ref: redis_enterprise/kubernetes/wait_rec_ready
      parameters:
        cluster_name: $CLUSTER_NAME
        namespace: $NAMESPACE

    - step_ref: redis_enterprise/kubernetes/get_cluster_credentials
      parameters:
        cluster_name: $CLUSTER_NAME
        namespace: $NAMESPACE

    - step_ref: redis_enterprise/kubernetes/verify_cluster_ui
      parameters:
        cluster_name: $CLUSTER_NAME
        namespace: $NAMESPACE

  post_validations:
    - check: operator_running
      command: "kubectl get pods -n $NAMESPACE -l name=redis-enterprise-operator | grep -q 'Running'"
      expect: "Running"

    - check: cluster_running
      command: "kubectl get rec $CLUSTER_NAME -n $NAMESPACE -o jsonpath='{.status.state}' | grep -q 'Running'"
      expect: "Running"

    - check: all_nodes_ready
      command: "kubectl get pods -n $NAMESPACE -l app=redis-enterprise | grep -c 'Running' | grep -q '3'"
      expect: "3"

    - check: ui_service_exists
      command: "kubectl get svc $CLUSTER_NAME-ui -n $NAMESPACE"
      expect: "$CLUSTER_NAME-ui"

  rollback:
    - command: "kubectl delete rec $CLUSTER_NAME -n $NAMESPACE"
    - command: "kubectl delete -f https://raw.githubusercontent.com/RedisLabs/redis-enterprise-k8s-docs/master/bundle.yaml"

  notes:
    - "This runbook deploys a 3-node Redis Enterprise Cluster on Kubernetes"
    - "Prerequisites: Kubernetes cluster must be running and accessible via kubectl"
    - "The operator manages the lifecycle of the Redis Enterprise Cluster"
    - "For Active-Active deployments, deploy this runbook twice (once per region/cluster)"
    - "Environment variables required: NAMESPACE, CLUSTER_NAME, STORAGE_CLASS, ADMIN_USERNAME"
    - "Default storage class can be used if STORAGE_CLASS is not specified"
    - "After deployment, use the UI service LoadBalancer IP to access the cluster management interface"

