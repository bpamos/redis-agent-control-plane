runbook:
  id: runbook.redis_enterprise.kubernetes.active_active
  name: "Redis Enterprise on Kubernetes - Active-Active Preparation"
  description: "Configure two Redis Enterprise Kubernetes clusters for Active-Active (REAADB) database deployment. Handles admission controller installation, secrets exchange, and cluster linking."
  version: "2.0.0"
  redis_version: "8.0.x"
  validated: true
  validation_date: "2026-03-05"

  prerequisites:
    - check: cluster1_deployed
      command: "kubectl get rec $CLUSTER1_NAME -n $NAMESPACE1 -o jsonpath='{.status.state}' | grep -q 'Running'"
      error_message: "Cluster 1 is not deployed or not healthy. Deploy using clustered.yaml first."

    - check: cluster2_deployed
      command: "kubectl get rec $CLUSTER2_NAME -n $NAMESPACE2 --context=$CLUSTER2_CONTEXT -o jsonpath='{.status.state}' | grep -q 'Running'"
      error_message: "Cluster 2 is not deployed or not healthy. Deploy using clustered.yaml first."

    - check: kubectl_contexts_configured
      command: "kubectl config get-contexts | grep -q '$CLUSTER2_CONTEXT'"
      error_message: "Kubernetes context for cluster 2 is not configured. Set up kubeconfig with both cluster contexts."

  steps:
    - id: step_1
      name: "Install admission controller on cluster 1"
      description: "Deploy the Redis Enterprise admission controller webhook on cluster 1"
      doc_refs:
        - path: "operate/kubernetes/deployment/quick-start.md"
          section: "Install the admission controller"
      rag_assist:
        query: "How do I install the Redis Enterprise admission controller on Kubernetes?"
        filters:
          category: operate
          product_area: redis_software
        max_results: 5
      tool: kubectl
      command: "kubectl apply -f https://raw.githubusercontent.com/RedisLabs/redis-enterprise-k8s-docs/master/admission/webhook.yaml -n $NAMESPACE1"
      validation:
        command: "kubectl get validatingwebhookconfiguration redb-admission -n $NAMESPACE1"
        expect: "redb-admission"
        retry: 5
        retry_delay: 3

    - id: step_2
      name: "Install admission controller on cluster 2"
      description: "Deploy the Redis Enterprise admission controller webhook on cluster 2"
      doc_refs:
        - path: "operate/kubernetes/deployment/quick-start.md"
          section: "Install the admission controller"
      rag_assist:
        query: "How do I install the Redis Enterprise admission controller on Kubernetes?"
        filters:
          category: operate
          product_area: redis_software
        max_results: 5
      tool: kubectl
      command: "kubectl apply -f https://raw.githubusercontent.com/RedisLabs/redis-enterprise-k8s-docs/master/admission/webhook.yaml -n $NAMESPACE2 --context=$CLUSTER2_CONTEXT"
      validation:
        command: "kubectl get validatingwebhookconfiguration redb-admission -n $NAMESPACE2 --context=$CLUSTER2_CONTEXT"
        expect: "redb-admission"
        retry: 5
        retry_delay: 3

    - id: step_3
      name: "Get cluster 1 credentials secret"
      description: "Export cluster 1's credentials for exchange with cluster 2"
      doc_refs:
        - path: "operate/kubernetes/re-databases/db-controller.md"
          section: "Active-Active database"
      rag_assist:
        query: "How do I configure Active-Active databases on Kubernetes?"
        filters:
          category: operate
          product_area: redis_software
        max_results: 5
      tool: kubectl
      command: "kubectl get secret $CLUSTER1_NAME -n $NAMESPACE1 -o yaml > /tmp/cluster1-secret.yaml"
      validation:
        command: "test -f /tmp/cluster1-secret.yaml && grep -q 'password' /tmp/cluster1-secret.yaml"
        expect: "password"

    - id: step_4
      name: "Get cluster 2 credentials secret"
      description: "Export cluster 2's credentials for exchange with cluster 1"
      doc_refs:
        - path: "operate/kubernetes/re-databases/db-controller.md"
          section: "Active-Active database"
      rag_assist:
        query: "How do I configure Active-Active databases on Kubernetes?"
        filters:
          category: operate
          product_area: redis_software
        max_results: 5
      tool: kubectl
      command: "kubectl get secret $CLUSTER2_NAME -n $NAMESPACE2 --context=$CLUSTER2_CONTEXT -o yaml > /tmp/cluster2-secret.yaml"
      validation:
        command: "test -f /tmp/cluster2-secret.yaml && grep -q 'password' /tmp/cluster2-secret.yaml"
        expect: "password"

    - id: step_5
      name: "Create cluster 2 secret in cluster 1"
      description: "Import cluster 2's credentials into cluster 1's namespace for Active-Active linking"
      doc_refs:
        - path: "operate/kubernetes/re-databases/db-controller.md"
          section: "Active-Active database"
      rag_assist:
        query: "How do I set up participating clusters for Active-Active on Kubernetes?"
        filters:
          category: operate
          product_area: redis_software
        max_results: 3
      tool: kubectl
      command: "sed 's/namespace: $NAMESPACE2/namespace: $NAMESPACE1/' /tmp/cluster2-secret.yaml | kubectl apply -f - -n $NAMESPACE1"
      validation:
        command: "kubectl get secret $CLUSTER2_NAME -n $NAMESPACE1"
        expect: "$CLUSTER2_NAME"
        retry: 3
        retry_delay: 2

    - id: step_6
      name: "Create cluster 1 secret in cluster 2"
      description: "Import cluster 1's credentials into cluster 2's namespace for Active-Active linking"
      doc_refs:
        - path: "operate/kubernetes/re-databases/db-controller.md"
          section: "Active-Active database"
      rag_assist:
        query: "How do I set up participating clusters for Active-Active on Kubernetes?"
        filters:
          category: operate
          product_area: redis_software
        max_results: 3
      tool: kubectl
      command: "sed 's/namespace: $NAMESPACE1/namespace: $NAMESPACE2/' /tmp/cluster1-secret.yaml | kubectl apply -f - -n $NAMESPACE2 --context=$CLUSTER2_CONTEXT"
      validation:
        command: "kubectl get secret $CLUSTER1_NAME -n $NAMESPACE2 --context=$CLUSTER2_CONTEXT"
        expect: "$CLUSTER1_NAME"
        retry: 3
        retry_delay: 2

    - id: step_7
      name: "Get cluster 1 API endpoint"
      description: "Retrieve the API service endpoint for cluster 1"
      doc_refs:
        - path: "operate/kubernetes/re-databases/db-controller.md"
          section: "Active-Active database"
      rag_assist:
        query: "How do I get the Redis Enterprise API endpoint on Kubernetes?"
        filters:
          category: operate
          product_area: redis_software
        max_results: 3
      tool: kubectl
      command: "kubectl get svc $CLUSTER1_NAME -n $NAMESPACE1 -o jsonpath='{.status.loadBalancer.ingress[0].hostname}'"
      validation:
        command: "kubectl get svc $CLUSTER1_NAME -n $NAMESPACE1"
        expect: "$CLUSTER1_NAME"

    - id: step_8
      name: "Get cluster 2 API endpoint"
      description: "Retrieve the API service endpoint for cluster 2"
      doc_refs:
        - path: "operate/kubernetes/re-databases/db-controller.md"
          section: "Active-Active database"
      rag_assist:
        query: "How do I get the Redis Enterprise API endpoint on Kubernetes?"
        filters:
          category: operate
          product_area: redis_software
        max_results: 3
      tool: kubectl
      command: "kubectl get svc $CLUSTER2_NAME -n $NAMESPACE2 --context=$CLUSTER2_CONTEXT -o jsonpath='{.status.loadBalancer.ingress[0].hostname}'"
      validation:
        command: "kubectl get svc $CLUSTER2_NAME -n $NAMESPACE2 --context=$CLUSTER2_CONTEXT"
        expect: "$CLUSTER2_NAME"

    - id: step_9
      name: "Verify Active-Active prerequisites"
      description: "Verify that both clusters have the necessary components for Active-Active database creation"
      doc_refs:
        - path: "operate/kubernetes/re-databases/db-controller.md"
          section: "Active-Active database"
      rag_assist:
        query: "What are the prerequisites for Active-Active databases on Kubernetes?"
        filters:
          category: operate
          product_area: redis_software
        max_results: 3
      tool: kubectl
      command: "kubectl get rec $CLUSTER1_NAME -n $NAMESPACE1 -o jsonpath='{.status.state}'"
      validation:
        command: "kubectl get rec $CLUSTER1_NAME -n $NAMESPACE1 -o jsonpath='{.status.state}' | grep -q 'Running'"
        expect: "Running"

  post_validations:
    - check: cluster1_admission_controller
      command: "kubectl get validatingwebhookconfiguration redb-admission -n $NAMESPACE1"
      expect: "redb-admission"

    - check: cluster2_admission_controller
      command: "kubectl get validatingwebhookconfiguration redb-admission -n $NAMESPACE2 --context=$CLUSTER2_CONTEXT"
      expect: "redb-admission"

    - check: cluster1_has_cluster2_secret
      command: "kubectl get secret $CLUSTER2_NAME -n $NAMESPACE1"
      expect: "$CLUSTER2_NAME"

    - check: cluster2_has_cluster1_secret
      command: "kubectl get secret $CLUSTER1_NAME -n $NAMESPACE2 --context=$CLUSTER2_CONTEXT"
      expect: "$CLUSTER1_NAME"

  rollback:
    - command: "kubectl delete secret $CLUSTER2_NAME -n $NAMESPACE1"
    - command: "kubectl delete secret $CLUSTER1_NAME -n $NAMESPACE2 --context=$CLUSTER2_CONTEXT"
    - command: "kubectl delete validatingwebhookconfiguration redb-admission -n $NAMESPACE1"
    - command: "kubectl delete validatingwebhookconfiguration redb-admission -n $NAMESPACE2 --context=$CLUSTER2_CONTEXT"
    - command: "rm -f /tmp/cluster1-secret.yaml /tmp/cluster2-secret.yaml"

  notes:
    - "This runbook prepares two Redis Enterprise Kubernetes clusters for Active-Active (REAADB) database deployment"
    - "Prerequisites: Both clusters must be deployed using clustered.yaml before running this runbook"
    - "Infrastructure requirements: Cross-cluster networking must be configured (VPC peering, security groups)"
    - "After completion, use the REAADB database creation runbook to create Active-Active databases"
    - "Environment variables required: NAMESPACE1, NAMESPACE2, CLUSTER1_NAME, CLUSTER2_NAME, CLUSTER2_CONTEXT"
    - "The admission controller validates REDB custom resources before they are created"
    - "Secrets exchange allows each cluster to authenticate with the other for Active-Active replication"

