# Runbook Routing Registry
#
# This registry provides data-driven routing from DeploymentSpec to runbook_id.
# Adding a new runbook is now a config change, not a code change.
#
# Schema:
#   registry_version: Version of this registry format (semver)
#   runbooks: List of runbook entries
#     - id: Unique runbook identifier (must match runbook YAML file)
#       name: Human-readable name
#       path: Relative path to runbook YAML file from repo root
#       selectors: Matching criteria for DeploymentSpec
#         product: redis_enterprise | redis_cloud | redis_stack
#         platform: vm | kubernetes | eks | gke | aks | openshift | aws | gcp | azure
#         topology: single_node | clustered | active_active
#         cloud_provider: aws | gcp | azure | on_prem (optional)
#         # Future: Advanced selectors like "scale.nodes: >= 5"
#       priority: Integer priority (higher = more specific, matched first)
#       enabled: Boolean flag to enable/disable runbook
#
# Routing Algorithm:
#   1. Load all runbooks from registry
#   2. Filter by enabled=true
#   3. Match selectors against DeploymentSpec (all selectors must match)
#   4. Sort by priority (descending)
#   5. Return highest priority match
#   6. Fail loudly if no match or ambiguous match (same priority)
#
# Priority Guidelines:
#   - 100: Standard/default runbooks
#   - 200: Specialized variants (e.g., HA clusters with >= 5 nodes)
#   - 300: Highly specific edge cases
#
# Collision Detection:
#   - Same selectors + same priority = ERROR (ambiguous)
#   - Same selectors + different priority = OK (higher priority wins)
#

registry_version: "1.0.0"

runbooks:
  # Redis Enterprise - Kubernetes
  - id: runbook.redis_enterprise.kubernetes.clustered
    name: "Redis Enterprise on Kubernetes - 3-Node Cluster"
    path: "runbooks/redis_enterprise/kubernetes/clustered.yaml"
    selectors:
      product: redis_enterprise
      platform: kubernetes
      topology: clustered
    priority: 100
    enabled: true

