step:
  id: join_cluster_ui
  name: "Add node to cluster"
  description: "Navigate to the node's UI, select 'Join existing cluster', and enter the cluster credentials"
  doc_refs:
    - path: "operate/rs/clusters/add-node.md"
      section: "Add a node to a cluster"
  rag_assist:
    query: "How do I add a node to an existing Redis Enterprise cluster?"
    filters:
      category: operate
      product_area: redis_software
    max_results: 5
  tool: manual
  command: "echo 'Manual step: Navigate to https://$TARGET_HOST:8443, select Join existing cluster, and enter cluster credentials'"
  validation:
    command: "curl -k -s -o /dev/null -w '%{http_code}' https://$TARGET_HOST:8443"
    expect: "200"
  parameters:
    - name: target_host
      type: string
      default: "localhost"
      description: "Target host to join to cluster"

