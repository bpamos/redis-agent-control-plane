step:
  id: create_db_rest_api
  name: "Create database via REST API"
  description: "Create a standard Redis database with specified memory and configuration using the REST API"
  doc_refs:
    - path: "operate/rs/databases/create.md"
      section: "Create database with additional configuration"
  rag_assist:
    query: "How do I create a Redis database on Redis Enterprise using the REST API?"
    filters:
      category: operate
      product_area: redis_software
    max_results: 5
  tool: curl
  command: |
    curl -k -u "$ADMIN_USERNAME:$ADMIN_PASSWORD" \
      -H "Content-Type: application/json" \
      -X POST https://$CLUSTER_HOST:9443/v1/bdbs \
      -d '{
        "name": "'$DB_NAME'",
        "type": "redis",
        "memory_size": '$MEMORY_SIZE',
        "port": '$DB_PORT',
        "replication": '$REPLICATION_ENABLED',
        "sharding": false,
        "shards_count": 1,
        "proxy_policy": "all-master-shards",
        "oss_cluster": false
      }'
  validation:
    command: "curl -k -s -u '$ADMIN_USERNAME:$ADMIN_PASSWORD' https://$CLUSTER_HOST:9443/v1/bdbs | grep -q '$DB_NAME'"
    expect: "$DB_NAME"
    retry: 10
    retry_delay: 3
  parameters:
    - name: cluster_host
      type: string
      default: "localhost"
      description: "Cluster host for REST API"
    - name: admin_username
      type: string
      default: "admin@redis.com"
      description: "Admin username"
    - name: admin_password
      type: string
      default: "password"
      description: "Admin password"
    - name: db_name
      type: string
      default: "redis-db"
      description: "Database name"
    - name: memory_size
      type: int
      default: 1073741824
      description: "Memory size in bytes (default 1GB)"
    - name: db_port
      type: int
      default: 12000
      description: "Database port"
    - name: replication_enabled
      type: bool
      default: true
      description: "Enable replication"

