step:
  id: test_db_connectivity_redis_cli
  name: "Test database connectivity with redis-cli"
  description: "Verify the database is accessible by performing a simple PING command using redis-cli"
  doc_refs:
    - path: "operate/rs/databases/create.md"
      section: "Test client connectivity"
  rag_assist:
    query: "How do I test connectivity to a Redis database?"
    filters:
      category: operate
      product_area: redis_software
    max_results: 3
  tool: ssh
  command: "ssh $CLUSTER_HOST 'redis-cli -h $DB_HOST -p $DB_PORT PING'"
  validation:
    command: "ssh $CLUSTER_HOST 'redis-cli -h $DB_HOST -p $DB_PORT PING' | grep -q 'PONG'"
    expect: "PONG"
    retry: 5
    retry_delay: 3
  parameters:
    - name: cluster_host
      type: string
      default: "localhost"
      description: "Cluster host to run redis-cli from"
    - name: db_host
      type: string
      default: "localhost"
      description: "Database host"
    - name: db_port
      type: int
      default: 12000
      description: "Database port"

