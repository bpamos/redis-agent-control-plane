step:
  id: wait_redb_active
  name: "Wait for REDB to become active"
  description: "Wait for the database to be fully provisioned and active"
  doc_refs:
    - path: "operate/kubernetes/re-databases/db-controller.md"
      section: "Create a database"
  rag_assist:
    query: "How do I verify a REDB is active on Kubernetes?"
    filters:
      category: operate
      product_area: redis_software
    max_results: 3
  tool: kubectl
  command: "kubectl wait --for=condition=ready --timeout=600s redb/$DB_NAME -n $NAMESPACE"
  validation:
    command: "kubectl get redb $DB_NAME -n $NAMESPACE -o jsonpath='{.status.status}' | grep -q 'active'"
    expect: "active"
    retry: 60
    retry_delay: 5
  parameters:
    - name: db_name
      type: string
      default: "redis-db"
      description: "Database name"
    - name: namespace
      type: string
      default: "redis"
      description: "Kubernetes namespace"

