step:
  id: create_redb
  name: "Create REDB custom resource"
  description: "Create a RedisEnterpriseDatabase (REDB) custom resource with specified configuration"
  doc_refs:
    - path: "operate/kubernetes/re-databases/db-controller.md"
      section: "Create a database"
  rag_assist:
    query: "How do I create a Redis Enterprise Database on Kubernetes using REDB?"
    filters:
      category: operate
      product_area: redis_software
    max_results: 5
  tool: kubectl
  command: |
    cat <<EOF | kubectl apply -f -
    apiVersion: app.redislabs.com/v1alpha1
    kind: RedisEnterpriseDatabase
    metadata:
      name: $DB_NAME
      namespace: $NAMESPACE
    spec:
      redisEnterpriseCluster:
        name: $REC_NAME
      memorySize: $MEMORY_SIZE
      replication: $REPLICATION
      shardCount: $SHARD_COUNT
      tlsMode: $TLS_MODE
      type: redis
      persistence: $PERSISTENCE
      proxyPolicy: all-master-shards
    EOF
  validation:
    command: "kubectl get redb $DB_NAME -n $NAMESPACE"
    expect: "$DB_NAME"
    retry: 5
    retry_delay: 3
  parameters:
    - name: db_name
      type: string
      default: "redis-db"
      description: "Database name"
    - name: namespace
      type: string
      default: "redis"
      description: "Kubernetes namespace"
    - name: rec_name
      type: string
      default: "rec"
      description: "Redis Enterprise Cluster name"
    - name: memory_size
      type: string
      default: "1GB"
      description: "Database memory size"
    - name: replication
      type: bool
      default: true
      description: "Enable replication"
    - name: shard_count
      type: int
      default: 1
      description: "Number of shards"
    - name: tls_mode
      type: string
      default: "disabled"
      description: "TLS mode (disabled/enabled)"
    - name: persistence
      type: string
      default: "aofEverySecond"
      description: "Persistence mode"

